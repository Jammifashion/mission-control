<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Portal – Jammi Fashion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #121212; --card: #1e1e1e; --border: #2e2e2e;
      --text: #e0e0e0; --muted: #999; --accent: #e8c44a;
      --success: #4caf50; --danger: #f44336;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
    }
    header .logo { font-size: 1.05rem; color: var(--accent); font-weight: 700; letter-spacing: 0.02em; }
    header .partner-name { font-size: 0.9rem; color: var(--muted); }
    main { max-width: 1060px; margin: 0 auto; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.1rem; }
    .card-header h2 { font-size: 1rem; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead tr { border-bottom: 1px solid var(--border); }
    th { padding: 0.55rem 0.8rem; text-align: left; color: var(--muted); font-weight: 500; font-size: 0.82rem; white-space: nowrap; }
    td { padding: 0.6rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.22rem 0.65rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
    .badge-offen        { background: rgba(255,193,7,0.15);   color: #ffc107; }
    .badge-abgerechnet  { background: rgba(76,175,80,0.15);   color: #4caf50; }
    .badge-angefordert  { background: rgba(255,193,7,0.15);   color: #ffc107; }
    .badge-geprueft     { background: rgba(33,150,243,0.15);  color: #42a5f5; }
    .badge-bezahlt      { background: rgba(76,175,80,0.15);   color: #4caf50; }
    .skeleton { background: linear-gradient(90deg, var(--card) 25%, #252525 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; height: 80px; }
    @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
    .empty { color: var(--muted); font-size: 0.88rem; padding: 1.5rem 0; }
    .summary { font-size: 0.84rem; color: var(--muted); margin-bottom: 0.85rem; }
    .summary strong { color: var(--text); }
    .btn {
      background: var(--accent); color: #000; border: none; border-radius: 6px;
      padding: 0.45rem 1.1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-outline {
      background: transparent; color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.4rem 0.9rem; font-size: 0.84rem; cursor: pointer;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    /* Error / splash */
    #splash { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 1rem; }
    #splash p { color: var(--muted); font-size: 0.92rem; }
    .error-box { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.35); border-radius: 8px; padding: 1.5rem 2rem; text-align: center; }
    .error-box p { color: var(--danger); font-size: 1rem; line-height: 1.6; }
    /* API config */
    .api-cfg { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .api-cfg label { font-size: 0.84rem; color: var(--muted); white-space: nowrap; }
    .api-cfg input { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.75rem; color: var(--text); font-size: 0.88rem; }
    /* Saldo */
    .saldo-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.4rem 0; font-size: 0.92rem; }
    .saldo-row.muted { color: var(--muted); font-size: 0.86rem; }
    .saldo-row .amount { font-variant-numeric: tabular-nums; font-weight: 600; }
    .saldo-divider { border: none; border-top: 1px solid var(--border); margin: 0.4rem 0; }
    .saldo-final { font-size: 1.05rem; font-weight: 700; padding-top: 0.4rem; }
    .saldo-positive { color: #4caf50; }
    .saldo-negative { color: var(--danger); }
    /* Abrechnungs-Detail (gerendert innerhalb der äußeren Card) */
    .abr-card { padding-top: 1.25rem; margin-top: 1.25rem; border-top: 1px solid var(--border); }
    .abr-card:first-child { padding-top: 0; margin-top: 0; border-top: none; }
    .abr-card h3 { font-size: 0.9rem; margin: 1rem 0 0.4rem; font-weight: 600; color: var(--text); }
    .abr-card h3:first-child { margin-top: 0; }
    .abr-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 0.5rem; padding-bottom: 0.6rem; margin-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .abr-zeitraum { font-size: 0.86rem; color: var(--muted); }
    .abr-summe { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .abr-summe.pos { color: #4caf50; }
    .abr-summe.neg { color: var(--danger); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

  <header>
    <span class="logo">Jammi Fashion – Partner Portal</span>
    <span class="partner-name" id="partner-name-header"></span>
  </header>

  <main id="main-content">
    <div id="splash">
      <div class="skeleton" style="width:220px;height:22px;border-radius:4px;"></div>
      <p>Daten werden geladen…</p>
    </div>
  </main>

  <script>
    const params   = new URLSearchParams(location.search);
    const TOKEN    = params.get('token') || '';
    const apiParam = params.get('api');

    if (apiParam) localStorage.setItem('mc_api_url', apiParam.replace(/\/$/, ''));
    let API_BASE = localStorage.getItem('mc_api_url') || '';

    const main = document.getElementById('main-content');

    async function apiGet(path) {
      if (!API_BASE) throw new Error('Backend-URL nicht konfiguriert.');
      const r = await fetch(`${API_BASE}${path}`);
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        const err  = new Error(body.error || r.statusText);
        err.status = r.status;
        throw err;
      }
      return r.json();
    }

    function fmt(val) {
      return Number(val).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
    }

    function badgeClass(s) {
      return { offen: 'badge-offen', abgerechnet: 'badge-abgerechnet',
               angefordert: 'badge-angefordert', geprüft: 'badge-geprueft', bezahlt: 'badge-bezahlt' }[s] ?? '';
    }

    function showError(msg) {
      main.innerHTML = `
        <div class="error-box" style="max-width:480px;margin:3rem auto;">
          <p>${msg}</p>
        </div>`;
    }

    function showApiConfig() {
      main.innerHTML = `
        <div class="api-cfg">
          <label>Backend-URL:</label>
          <input id="api-url-input" type="url" placeholder="https://backend.run.app" value="${API_BASE}">
          <button class="btn" id="api-save-btn">Laden</button>
        </div>
        <p style="font-size:0.84rem;color:var(--muted);margin-top:0.5rem;">
          Bitte Backend-URL eingeben (einmalig, wird gespeichert).
        </p>`;
      document.getElementById('api-save-btn').onclick = () => {
        const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
        if (!val) return;
        localStorage.setItem('mc_api_url', val);
        API_BASE = val;
        init();
      };
    }

    // ── Verkäufe laden & rendern ─────────────────────────────────────────────
    async function loadVerkaeufe() {
      const wrap = document.getElementById('pv-verkaeufe');
      if (!wrap) return;
      wrap.innerHTML = '<div class="skeleton"></div>';
      try {
        const rows = await apiGet(`/api/partner/verkaeufe?token=${encodeURIComponent(TOKEN)}`);
        if (!rows.length) { wrap.innerHTML = '<p class="empty">Keine offenen Verkäufe vorhanden.</p>'; return; }
        wrap.innerHTML = `
          <p class="summary">${rows.length} Eintrag/Einträge</p>
          <div style="overflow-x:auto;"><table>
            <thead><tr>
              <th>Bestellnummer</th><th>Artikel</th><th>Menge</th><th>Datum</th><th>Status Abrechnung</th>
            </tr></thead>
            <tbody>${rows.map(r => `<tr>
              <td>${r.orderId}</td>
              <td>${r.artikelname}</td>
              <td>${r.stueckzahl}</td>
              <td>${r.datum}</td>
              <td><span class="badge ${badgeClass(r.status)}">${r.status}</span></td>
            </tr>`).join('')}</tbody>
          </table></div>`;
      } catch (e) {
        wrap.innerHTML = `<p style="color:var(--danger);font-size:0.88rem;">Fehler: ${e.message}</p>`;
      }
    }

    // ── Direkte Bestellungen laden & rendern ─────────────────────────────────
    async function loadIntern() {
      const wrap = document.getElementById('pv-intern');
      if (!wrap) return;
      wrap.innerHTML = '<div class="skeleton"></div>';
      try {
        const rows = await apiGet(`/api/partner/intern?token=${encodeURIComponent(TOKEN)}`);
        if (!rows.length) { wrap.innerHTML = '<p class="empty">Keine direkten Bestellungen vorhanden.</p>'; return; }
        wrap.innerHTML = `
          <p class="summary">${rows.length} Eintrag/Einträge</p>
          <div style="overflow-x:auto;"><table>
            <thead><tr>
              <th>Datum</th><th>Bezeichnung</th>
              <th style="text-align:right;">Anzahl</th>
              <th style="text-align:right;">Einzelpreis brutto</th>
              <th style="text-align:right;">Summe</th>
              <th>Status Abrechnung</th>
            </tr></thead>
            <tbody>${rows.map(r => `<tr>
              <td>${r.datum}</td>
              <td>${r.bezeichnung}</td>
              <td style="text-align:right;">${r.anzahl}</td>
              <td style="text-align:right;">${fmt(r.einzelpreis)}</td>
              <td style="text-align:right;"><strong>${fmt(r.summe)}</strong></td>
              <td><span class="badge ${badgeClass(r.status)}">${r.status}</span></td>
            </tr>`).join('')}</tbody>
          </table></div>`;
      } catch (e) {
        wrap.innerHTML = `<p style="color:var(--danger);font-size:0.88rem;">Fehler: ${e.message}</p>`;
      }
    }

    // ── Saldo laden & rendern ────────────────────────────────────────────────
    async function loadSaldo() {
      const wrap = document.getElementById('pv-saldo');
      if (!wrap) return;
      wrap.innerHTML = '<div class="skeleton" style="height:120px;"></div>';
      try {
        const data = await apiGet(`/api/partner/saldo?token=${encodeURIComponent(TOKEN)}`);
        const positiv  = data.saldo >= 0;
        const label    = positiv ? 'Aktuelles Guthaben' : 'Aktueller Rückstand';
        const colorCls = positiv ? 'saldo-positive' : 'saldo-negative';
        wrap.innerHTML = `
          <div class="saldo-row">
            <span>Verkäufe (Lizenz)</span>
            <span class="amount saldo-positive">+${fmt(data.lizenzSumme)}</span>
          </div>
          <div class="saldo-row">
            <span>Direkte Bestellungen</span>
            <span class="amount saldo-negative">−${fmt(data.interneSumme)}</span>
          </div>
          <hr class="saldo-divider">
          <div class="saldo-row saldo-final">
            <span>${label}</span>
            <span class="amount ${colorCls}">${positiv ? '' : '−'}${fmt(Math.abs(data.saldo))}</span>
          </div>
          <p class="saldo-row muted" style="padding-top:0.6rem;">
            Nur offene, noch nicht abgerechnete Positionen.
          </p>`;
      } catch (e) {
        wrap.innerHTML = `<p style="color:var(--danger);font-size:0.88rem;">Fehler: ${e.message}</p>`;
      }
    }

    // ── Abrechnungen laden & rendern ─────────────────────────────────────────
    // Partner sieht nur freigegebene + bezahlte Abrechnungen (Entwürfe sind ausgeblendet).
    async function loadAbrechnungen() {
      const wrap = document.getElementById('pv-abrechnungen');
      if (!wrap) return;
      wrap.innerHTML = '<div class="skeleton"></div>';
      try {
        const rows = await apiGet(`/api/partner/abrechnungen?token=${encodeURIComponent(TOKEN)}`);
        if (!rows.length) { wrap.innerHTML = '<p class="empty">Noch keine Abrechnungen vorhanden.</p>'; return; }
        const sumBezahlt = rows.filter(r => r.status === 'bezahlt').reduce((s, r) => s + r.saldo, 0);

        // Sortierung: neueste zuerst
        rows.sort((a, b) => (b.erstelltAm || '').localeCompare(a.erstelltAm || ''));

        wrap.innerHTML = `
          <p class="summary">
            ${rows.length} Abrechnung(en) &nbsp;·&nbsp;
            Bereits ausgezahlt: <strong>${fmt(sumBezahlt)}</strong>
          </p>
          ${rows.map(r => renderAbrechnungBlock(r)).join('')}`;
      } catch (e) {
        wrap.innerHTML = `<p style="color:var(--danger);font-size:0.88rem;">Fehler: ${e.message}</p>`;
      }
    }

    function renderAbrechnungBlock(r) {
      const p = r.positionen || { verkaeufe: [], intern: [] };
      const isPos = r.saldo >= 0;
      const summeCls = isPos ? 'pos' : 'neg';
      const summeSign = isPos ? '' : '−';

      const verkaeufeRows = (p.verkaeufe && p.verkaeufe.length)
        ? p.verkaeufe.map(v => `<tr>
            <td>${v.datum}</td>
            <td>${v.orderId}</td>
            <td>${v.artikelname}</td>
            <td class="num">${v.stueckzahl}</td>
            <td class="num">${fmt(v.vkBrutto)}</td>
            <td class="num"><strong>${fmt(v.lizenz)}</strong></td>
          </tr>`).join('')
        : `<tr><td colspan="6" class="empty" style="text-align:center;">Keine Verkäufe</td></tr>`;

      const internRows = (p.intern && p.intern.length)
        ? p.intern.map(i => `<tr>
            <td>${i.datum}</td>
            <td>${i.bezeichnung}</td>
            <td class="num">${i.anzahl}</td>
            <td class="num">${fmt(i.summe)}</td>
          </tr>`).join('')
        : null;

      const internBlock = internRows ? `
        <h3>Direkte Bestellungen</h3>
        <div style="overflow-x:auto;"><table>
          <thead><tr>
            <th>Datum</th><th>Bezeichnung</th>
            <th class="num">Anzahl</th><th class="num">Summe</th>
          </tr></thead>
          <tbody>${internRows}</tbody>
        </table></div>` : '';

      const lizenzSumme  = (p.verkaeufe || []).reduce((s, v) => s + (v.lizenz || 0), 0);
      const interneSumme = (p.intern    || []).reduce((s, v) => s + (v.summe  || 0), 0);

      return `
        <div class="abr-card">
          <div class="abr-header">
            <div>
              <strong>${r.abrechnungId}</strong>
              <span class="abr-zeitraum">&nbsp;·&nbsp;${r.zeitraumVon} – ${r.zeitraumBis}</span>
              <span class="badge ${badgeClass(r.status)}" style="margin-left:0.5rem;">${r.status}</span>
            </div>
            <div class="abr-summe ${summeCls}">${summeSign}${fmt(Math.abs(r.saldo))}</div>
          </div>

          <h3>Verkäufe (${(p.verkaeufe || []).length})</h3>
          <div style="overflow-x:auto;"><table>
            <thead><tr>
              <th>Datum</th><th>Bestellnr.</th><th>Artikel</th>
              <th class="num">Menge</th><th class="num">VK brutto</th><th class="num">Lizenz</th>
            </tr></thead>
            <tbody>${verkaeufeRows}</tbody>
          </table></div>

          ${internBlock}

          <div style="margin-top:1rem;padding:0.85rem 1rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;max-width:480px;">
            <div class="saldo-row">
              <span>Lizenz-Summe</span>
              <span class="amount saldo-positive">+${fmt(lizenzSumme)}</span>
            </div>
            <div class="saldo-row">
              <span>Direkte Bestellungen</span>
              <span class="amount saldo-negative">−${fmt(interneSumme)}</span>
            </div>
            <hr class="saldo-divider">
            <div class="saldo-row saldo-final">
              <span>${r.status === 'bezahlt' ? 'Ausgezahlt' : 'Auszahlung'}</span>
              <span class="amount ${isPos ? 'saldo-positive' : 'saldo-negative'}">${summeSign}${fmt(Math.abs(r.saldo))}</span>
            </div>
          </div>
        </div>`;
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      if (!TOKEN) { showError('Kein Token in der URL.<br>Bitte nutze den Link deines Ansprechpartners bei Jammi Fashion.'); return; }
      if (!API_BASE) { showApiConfig(); return; }

      main.innerHTML = '<div class="skeleton" style="height:60px;border-radius:8px;"></div>';
      try {
        const me = await apiGet(`/api/partner/auth?token=${encodeURIComponent(TOKEN)}`);
        document.getElementById('partner-name-header').textContent = me.partnerName;
        document.title = `${me.partnerName} – Jammi Fashion Partner Portal`;
      } catch (e) {
        if (e.status === 401 || e.status === 403)
          showError('Kein Zugang.<br>Dein Token ist ungültig oder dein Konto wurde deaktiviert.');
        else showError(`Fehler beim Laden: ${e.message}`);
        return;
      }

      main.innerHTML = `
        <div class="card">
          <div class="card-header">
            <h2>Meine Verkäufe</h2>
            <button class="btn-outline" id="btn-refresh-verkaeufe">↻ Aktualisieren</button>
          </div>
          <div id="pv-verkaeufe"><div class="skeleton"></div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h2>Direkte Bestellungen</h2>
          </div>
          <div id="pv-intern"><div class="skeleton"></div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h2>Saldo (offene Posten)</h2>
          </div>
          <div id="pv-saldo"><div class="skeleton" style="height:120px;"></div></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h2>Meine Abrechnungen</h2>
          </div>
          <div id="pv-abrechnungen"><div class="skeleton"></div></div>
        </div>`;

      document.getElementById('btn-refresh-verkaeufe').addEventListener('click', () => {
        loadVerkaeufe();
        loadIntern();
        loadSaldo();
      });

      await Promise.all([loadVerkaeufe(), loadIntern(), loadSaldo(), loadAbrechnungen()]);
    }

    init();
  </script>
</body>
</html>
