<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Portal – Jammi Fashion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #121212; --card: #1e1e1e; --border: #2e2e2e;
      --text: #e0e0e0; --muted: #888; --accent: #e8c44a;
      --success: #4caf50; --danger: #f44336;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 0.95rem; min-height: 100vh; }
    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    header h1 { font-size: 1.1rem; color: var(--accent); font-weight: 700; letter-spacing: 0.02em; }
    header .partner-name { font-size: 0.9rem; color: var(--muted); }
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem; }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead tr { border-bottom: 1px solid var(--border); }
    th { padding: 0.55rem 0.75rem; text-align: left; color: var(--muted); font-weight: 500; font-size: 0.8rem; white-space: nowrap; }
    td { padding: 0.55rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-offen    { background: rgba(255,193,7,0.15);  color: #ffc107; }
    .badge-abgerechnet { background: rgba(76,175,80,0.15); color: #4caf50; }
    .badge-angefordert { background: rgba(255,193,7,0.15); color: #ffc107; }
    .badge-geprueft { background: rgba(33,150,243,0.15);  color: #42a5f5; }
    .badge-bezahlt  { background: rgba(76,175,80,0.15);  color: #4caf50; }
    .skeleton { background: linear-gradient(90deg, var(--card) 25%, #2a2a2a 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; height: 80px; }
    @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
    .error { color: var(--danger); padding: 2rem; text-align: center; }
    .muted { color: var(--muted); font-size: 0.85rem; }
    .summary { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.75rem; }
    .summary strong { color: var(--text); }
    #api-config { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    #api-config label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
    #api-config input { flex: 1; min-width: 220px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.75rem; color: var(--text); font-size: 0.85rem; }
    #api-config button { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 0.45rem 1rem; font-size: 0.83rem; font-weight: 600; cursor: pointer; }
    #splash { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 1rem; }
    #splash p { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <h1>Jammi Fashion – Partner Portal</h1>
    <span class="partner-name" id="partner-name-header"></span>
  </header>

  <main id="main-content">
    <div id="splash">
      <div class="skeleton" style="width:200px;height:20px;"></div>
      <p>Daten werden geladen…</p>
    </div>
  </main>

  <script>
    const params   = new URLSearchParams(location.search);
    const token    = params.get('token') || '';
    const apiParam = params.get('api');

    // api= aus URL dauerhaft speichern
    if (apiParam) localStorage.setItem('mc_api_url', apiParam.replace(/\/$/, ''));
    let API_BASE = localStorage.getItem('mc_api_url') || '';

    const main = document.getElementById('main-content');

    function fmt(val) {
      return Number(val).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
    }

    async function apiGet(path) {
      if (!API_BASE) throw new Error('Backend-URL nicht konfiguriert.');
      const r = await fetch(`${API_BASE}${path}`);
      if (!r.ok) {
        const body = await r.json().catch(() => ({ error: r.statusText }));
        throw new Error(body.error || r.statusText);
      }
      return r.json();
    }

    function showError(msg) {
      document.getElementById('splash')?.remove();
      main.innerHTML = `<div class="error"><p>${msg}</p></div>`;
    }

    function showApiConfig() {
      main.innerHTML = `
        <div id="api-config">
          <label>Backend-URL:</label>
          <input id="api-url-input" type="url" placeholder="https://backend.run.app" value="${API_BASE}">
          <button id="api-save-btn">Speichern & laden</button>
        </div>
        <div id="splash"><p>Bitte zuerst die Backend-URL konfigurieren.</p></div>`;
      document.getElementById('api-save-btn').onclick = () => {
        const val = document.getElementById('api-url-input').value.trim().replace(/\/$/, '');
        if (!val) return;
        localStorage.setItem('mc_api_url', val);
        API_BASE = val;
        init();
      };
    }

    function renderVerkaeufe(rows) {
      if (!rows.length) return '<p class="muted">Noch keine Verkäufe vorhanden.</p>';
      const sumLizenz = rows.reduce((s, r) => s + r.lizenzgebuehr, 0);
      const sumVk     = rows.reduce((s, r) => s + r.vkPreisBrutto, 0);
      return `
        <p class="summary">
          ${rows.length} Einträge &nbsp;·&nbsp; VK gesamt: <strong>${fmt(sumVk)}</strong>
          &nbsp;·&nbsp; Lizenz gesamt: <strong>${fmt(sumLizenz)}</strong>
        </p>
        <div style="overflow-x:auto;"><table>
          <thead><tr>
            <th>Datum</th><th>Order-ID</th><th>Artikel</th><th>Variante</th>
            <th>Stück</th><th>VK Brutto</th><th>Lizenzgeb.</th><th>Status</th>
          </tr></thead>
          <tbody>${rows.map(r => `<tr>
            <td>${r.datum}</td><td>${r.orderId}</td><td>${r.artikelnummer}</td>
            <td>${r.variante || '–'}</td><td>${r.stueckzahl}</td>
            <td>${fmt(r.vkPreisBrutto)}</td><td>${fmt(r.lizenzgebuehr)}</td>
            <td><span class="badge badge-${r.status}">${r.status}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>`;
    }

    function renderAbrechnungen(rows) {
      if (!rows.length) return '<p class="muted">Noch keine Abrechnungen vorhanden.</p>';
      return `<div style="overflow-x:auto;"><table>
        <thead><tr>
          <th>ID</th><th>Zeitraum Von</th><th>Zeitraum Bis</th>
          <th>Saldo</th><th>Status</th><th>Erstellt</th>
        </tr></thead>
        <tbody>${rows.map(r => {
          const cls = r.status === 'bezahlt' ? 'badge-bezahlt'
                    : r.status === 'geprüft' ? 'badge-geprueft'
                    : 'badge-angefordert';
          return `<tr>
            <td style="font-size:0.78rem;">${r.abrechnungId}</td>
            <td>${r.zeitraumVon}</td><td>${r.zeitraumBis}</td>
            <td><strong>${fmt(r.saldo)}</strong></td>
            <td><span class="badge ${cls}">${r.status}</span></td>
            <td style="font-size:0.78rem;">${r.erstelltAm}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }

    async function init() {
      if (!token) { showError('Kein Token in der URL.<br>Bitte verwende den Link deines Ansprechpartners.'); return; }
      if (!API_BASE) { showApiConfig(); return; }

      main.innerHTML = '<div class="skeleton"></div>';
      try {
        const [me, verkaeufe, abrechnungen] = await Promise.all([
          apiGet(`/api/partner-view/me?token=${encodeURIComponent(token)}`),
          apiGet(`/api/partner-view/verkaeufe?token=${encodeURIComponent(token)}`),
          apiGet(`/api/partner-view/abrechnungen?token=${encodeURIComponent(token)}`),
        ]);

        document.getElementById('partner-name-header').textContent = me.name;
        document.title = `${me.name} – Jammi Fashion Partner Portal`;

        main.innerHTML = `
          <div class="card">
            <h2>Verkäufe</h2>
            <div id="pv-verkaeufe">${renderVerkaeufe(verkaeufe)}</div>
          </div>
          <div class="card">
            <h2>Abrechnungen</h2>
            <div id="pv-abrechnungen">${renderAbrechnungen(abrechnungen)}</div>
          </div>`;
      } catch (e) {
        showError(e.message);
      }
    }

    init();
  </script>
</body>
</html>
