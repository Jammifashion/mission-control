name: Daily Backup

on:
  schedule:
    - cron: '0 3 * * *'   # täglich 03:00 UTC = 04:00/05:00 deutscher Zeit
  workflow_dispatch:        # manueller Trigger über GitHub UI

jobs:
  backup:
    name: Backup Google Sheet → Drive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google-credentials.json

      - name: Run backup
        env:
          GOOGLE_SHEET_ID:                ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_DRIVE_SHARED_DRIVE_ID:   ${{ secrets.GOOGLE_DRIVE_SHARED_DRIVE_ID }}
          GOOGLE_DRIVE_BACKUP_FOLDER_ID:  ${{ secrets.GOOGLE_DRIVE_BACKUP_FOLDER_ID }}
          GOOGLE_DRIVE_BACKUP_DAILY_ID:   ${{ secrets.GOOGLE_DRIVE_BACKUP_DAILY_ID }}
          GOOGLE_DRIVE_BACKUP_MONTHLY_ID: ${{ secrets.GOOGLE_DRIVE_BACKUP_MONTHLY_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ./google-credentials.json
        run: node backend/scripts/backup-daily.js
