name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/181760755456/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: mission-control-sa@mission-control-495711.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE=europe-west1-docker.pkg.dev/mission-control-495711/mission-control/backend
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mission-control-backend \
            --image europe-west1-docker.pkg.dev/mission-control-495711/mission-control/backend:latest \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --service-account mission-control-sa@mission-control-495711.iam.gserviceaccount.com \
            --set-env-vars NODE_ENV=production,GOOGLE_PROJECT_ID=mission-control-495711,PORT=8080 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 2
